<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凱旋門 ホール運営システム</title>
<style>
  :root{
    --charcoal:#241E19;
    --charcoal-2:#332A22;
    --ember:#C1531B;
    --ember-dark:#9C4013;
    --cream:#FBF6EE;
    --card:#FFFFFF;
    --ink:#2B2420;
    --muted:#8A7F72;
    --line:#E7DFD2;
    --green:#3F7D4C;
    --green-bg:#E4F1E6;
    --amber:#C98A2C;
    --amber-bg:#FBF0DC;
    --gray-bg:#EFEAE1;
    --gray-ink:#9C9184;
    --red:#B23A2E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans JP",-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{min-height:100vh;display:flex;flex-direction:column;}

  header{
    position:relative;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.045) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0 2px, transparent 2px 26px),
      linear-gradient(135deg, var(--charcoal), var(--charcoal-2));
    color:#F2E9DC;
    padding:22px 28px 0 28px;
    border-bottom:4px solid var(--ember);
  }
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
  .brand .mark{
    width:34px;height:34px;border-radius:8px;background:var(--ember);
    display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:16px;color:#241E19;flex:none;
  }
  .brand h1{font-size:19px;margin:0;font-weight:800;letter-spacing:.02em;}
  .sync-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:11.5px;color:#C8BBA8;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#5EA36B;flex:none;}
  .sync-dot.off{background:#B23A2E;}
  nav{display:flex;gap:4px;flex-wrap:wrap;}
  nav button{
    background:transparent;border:none;color:#D8CBB8;
    padding:10px 16px;font-size:13.5px;font-weight:700;cursor:pointer;
    border-radius:8px 8px 0 0;position:relative;top:1px;
    font-family:inherit;
  }
  nav button.active{background:var(--cream);color:var(--ink);}
  nav button:not(.active):hover{background:rgba(255,255,255,0.08);}

  main{flex:1;max-width:1180px;width:100%;margin:0 auto;padding:26px 28px 60px;}

  h2.title{font-size:20px;margin:0 0 18px;font-weight:800;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .grow{flex:1;min-width:180px;}

  label{font-size:12px;color:var(--muted);font-weight:700;display:block;margin-bottom:5px;}
  select, input[type=text], input[type=date], input[type=number], input[type=password], textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;
    font-size:14px;font-family:inherit;background:#fff;color:var(--ink);
    height:40px;box-sizing:border-box;
  }
  /* iOSのselectはOS側が内部余白を持っていて、CSSでwidthを揃えても実際の見た目幅がズレる。
     ネイティブの見た目を消して、矢印アイコンを自前で描画することで完全に揃える。 */
  select{
    -webkit-appearance:none;-moz-appearance:none;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 20 20'><path d='M5 8l5 5 5-5' fill='none' stroke='%238A7F72' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 12px center;
    background-size:13px;
    padding-right:32px;
  }
  /* iOSはinput[type=date]も独自の見た目(中央寄せ等)で描画するため上書き */
  input[type=date]{
    -webkit-appearance:none;appearance:none;
    text-align:left;line-height:1.2;
  }
  textarea{resize:vertical;min-height:56px;height:auto;}
  button.primary{
    background:var(--ember);color:#fff;border:none;border-radius:8px;
    padding:10px 20px;font-weight:800;font-size:13.5px;cursor:pointer;font-family:inherit;
  }
  button.primary:hover{background:var(--ember-dark);}
  button.ghost{
    background:transparent;color:var(--ember-dark);border:1px solid var(--ember);
    border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;
  }

  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;}
  table{border-collapse:collapse;width:100%;font-size:12.5px;}
  thead th{
    background:var(--charcoal);color:#EFE5D6;position:sticky;top:0;
    padding:10px 8px;text-align:center;font-weight:700;white-space:nowrap;
  }
  thead th.name-col{text-align:left;padding-left:14px;position:sticky;left:0;background:var(--charcoal);z-index:2;}
  tbody td{padding:8px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap;}
  tbody td.name-col{text-align:left;padding-left:14px;font-weight:700;position:sticky;left:0;background:var(--card);z-index:1;}
  tbody tr:hover td.name-col{background:#FAF5EC;}
  tbody tr:hover{background:#FAF5EC;}
  .rank-chip{
    display:inline-block;font-size:10.5px;font-weight:800;color:var(--muted);
    background:var(--gray-bg);padding:1px 7px;border-radius:20px;margin-left:6px;
  }
  .score-cell{
    display:inline-flex;align-items:center;justify-content:center;
    width:30px;height:24px;border-radius:6px;font-weight:800;font-variant-numeric:tabular-nums;
  }
  .score-cell.ready{background:var(--green-bg);color:var(--green);}
  .score-cell.mid{background:var(--amber-bg);color:var(--amber);}
  .score-cell.low{background:var(--gray-bg);color:var(--gray-ink);}
  .legend{display:flex;gap:16px;margin:14px 2px 0;font-size:12px;color:var(--muted);flex-wrap:wrap;align-items:center;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}

  .staff-picker{max-width:340px;margin-bottom:18px;}
  .pos-edit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .pos-edit{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
  .pos-edit .lbl{font-size:12px;font-weight:800;margin-bottom:2px;}
  .pos-edit .name{font-size:10.5px;color:var(--muted);margin-bottom:6px;min-height:14px;}
  .pos-edit input[type=range]{width:100%;accent-color:var(--ember);}
  .pos-edit .val{font-size:13px;font-weight:800;color:var(--ember-dark);text-align:right;}

  .item-row{
    display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
    padding:12px 4px;border-bottom:1px solid var(--line);font-size:13.5px;
  }
  .item-row:last-child{border-bottom:none;}
  .item-row .meta{color:var(--muted);font-size:12px;margin-top:2px;}
  .badge{
    font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;
    background:var(--amber-bg);color:var(--amber);white-space:nowrap;
  }
  .badge.done{background:var(--green-bg);color:var(--green);}
  .badge.overdue{background:#FBE4E1;color:var(--red);}
  .badge.progress{background:var(--amber-bg);color:var(--amber);}
  .section-head{font-weight:800;font-size:13px;margin:18px 0 6px;color:var(--ink);display:flex;align-items:center;gap:8px;}
  .section-head:first-child{margin-top:0;}
  .count-pill{background:var(--gray-bg);color:var(--muted);font-size:11px;font-weight:800;padding:1px 8px;border-radius:20px;}
  .edit-form{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:12px;width:100%;display:flex;flex-direction:column;gap:8px;}
  .edit-form .row2{display:flex;gap:8px;}
  .item-actions{display:flex;gap:6px;flex-wrap:wrap;flex:none;}
  button.ghost.small{padding:6px 11px;font-size:12px;}
  .empty{color:var(--muted);font-size:13px;padding:18px 4px;text-align:center;}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media (max-width:820px){.two-col{grid-template-columns:1fr;} .app{overflow-x:hidden;}}

  /* ---- スマホ表示(自動判定 or 右上ボタンで手動切り替え) ---- */
  body.mobile-mode header{padding:14px 14px 0 14px;}
  body.mobile-mode .brand h1{font-size:15px;}
  body.mobile-mode .brand img{height:32px;}
  body.mobile-mode main{padding:14px 14px 40px;}
  body.mobile-mode h2.title{font-size:17px;}
  body.mobile-mode .card{padding:14px;border-radius:12px;}

  /* タブは折り返さず横スクロールに */
  body.mobile-mode nav{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  body.mobile-mode nav button{padding:9px 12px;font-size:12.5px;flex:none;}

  /* iOSでの自動ズームを防ぐため入力系は16px */
  body.mobile-mode select, body.mobile-mode input[type=text], body.mobile-mode input[type=date],
  body.mobile-mode input[type=number], body.mobile-mode input[type=password], body.mobile-mode textarea{font-size:16px;}

  /* 目標・ログ・スタッフ行はボタンを下に落として縦積みに */
  body.mobile-mode .item-row{flex-direction:column;}
  body.mobile-mode .item-actions{width:100%;}
  body.mobile-mode .item-actions button{flex:1;}

  body.mobile-mode .pos-edit-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
  body.mobile-mode table{font-size:11.5px;}
  body.mobile-mode .score-cell{width:26px;height:22px;}

  .mode-toggle{
    position:absolute;top:20px;right:28px;display:flex;gap:2px;
    background:rgba(255,255,255,0.08);border-radius:20px;padding:3px;
  }
  .mode-toggle button{
    background:transparent;border:none;color:#D8CBB8;font-size:11.5px;font-weight:700;
    padding:5px 12px;border-radius:16px;cursor:pointer;font-family:inherit;
  }
  .mode-toggle button.active{background:var(--ember);color:#fff;}
  body.mobile-mode .mode-toggle{position:static;margin-bottom:10px;align-self:flex-start;}

  .save-toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--charcoal);color:#fff;padding:10px 20px;border-radius:30px;
    font-size:13px;font-weight:700;opacity:0;transition:.25s;pointer-events:none;z-index:50;
  }
  .save-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .login-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.045) 0 2px, transparent 2px 26px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0 2px, transparent 2px 26px),
      linear-gradient(135deg, var(--charcoal), var(--charcoal-2));
    padding:20px;
  }
  .login-card{
    background:var(--card);border-radius:16px;padding:32px 28px;width:100%;max-width:340px;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  }
  .login-card img{height:44px;width:auto;border-radius:5px;margin-bottom:14px;}
  .login-card h2{font-size:17px;margin:0 0 4px;font-weight:800;color:var(--ink);}
  .login-card p{font-size:12.5px;color:var(--muted);margin:0 0 18px;}
  .login-card input{margin-bottom:10px;height:42px;box-sizing:border-box;}
  .login-card button{width:100%;margin-top:4px;}
  .login-error{color:var(--red);font-size:12.5px;margin-top:10px;min-height:16px;}

  .logout-btn{
    background:transparent;border:1px solid rgba(255,255,255,0.25);color:#EFE5D6;
    border-radius:20px;padding:3px 12px;font-size:11px;cursor:pointer;font-family:inherit;
  }
</style>
</head>

function parseTenureMonths(t){
  const m = /^(\d+)年(\d+)ヶ月$/.exec(t||"");
  if(!m) return null;
  return Number(m[1])*12 + Number(m[2]);
}
function linearRegression(points){
  const n = points.length;
  const sumX = points.reduce((a,p)=>a+p.x,0);
  const sumY = points.reduce((a,p)=>a+p.y,0);
  const sumXY = points.reduce((a,p)=>a+p.x*p.y,0);
  const sumXX = points.reduce((a,p)=>a+p.x*p.x,0);
  const denom = (n*sumXX - sumX*sumX);
  const slope = denom===0 ? 0 : (n*sumXY - sumX*sumY) / denom;
  const intercept = (sumY - slope*sumX)/n;
  return {slope, intercept};
}
/* 勤続 x 総合評価(業務)の傾向線からの乖離を見る */
function renderGrowthGapCard(){
  const columns = TASK_ITEMS;
  const points = state.staff.map(s=>{
    const months = parseTenureMonths(s.tenure);
    const overall = overallScore(s, columns, "tasks");
    return {staff:s, months, overall};
  }).filter(p=>p.months!==null);

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<div style="font-weight:800;margin-bottom:10px;">勤続 × 成長ギャップ</div>`;

  if(points.length < 4){
    const e = document.createElement("div");
    e.className = "empty";
    e.textContent = "入社日が入力されている人数が少なく、傾向線を出せません";
    card.appendChild(e);
    return card;
  }

  const {slope, intercept} = linearRegression(points.map(p=>({x:p.months, y:p.overall})));
  const withResidual = points.map(p=>({
    ...p,
    predicted: slope*p.months + intercept,
    residual: p.overall - (slope*p.months + intercept),
  }));

  const under = [...withResidual].sort((a,b)=>a.residual-b.residual).slice(0,3);
  const over  = [...withResidual].sort((a,b)=>b.residual-a.residual).slice(0,3);

  const makeSection = (title, list, sign) => {
    const head = document.createElement("div");
    head.className = "section-head";
    head.textContent = title;
    card.appendChild(head);
    list.forEach(p=>{
      const row = document.createElement("div");
      row.className = "item-row";
      const deltaStr = (p.residual>=0?"+":"") + p.residual.toFixed(2);
      row.innerHTML = `
        <div>
          <div><strong>${p.staff.name}</strong> <span class="rank-chip">${p.staff.rank}</span></div>
          <div class="meta">勤続 ${p.staff.tenure} ・ 総合評価 ${p.overall.toFixed(2)} ・ 傾向値との差 ${deltaStr}</div>
        </div>
      `;
      card.appendChild(row);
    });
  };
  makeSection("要フォロー", under);
  makeSection("好調", over);

  return card;
}

/* ---------- レーダーチャート(個人 vs チーム平均) ---------- */
function buildRadarSVG(items, seriesIndividual, seriesAvg, maxVal){
  const size = 320;
  const center = size/2;
  const radius = size/2 - 46;
  const angleStep = (2*Math.PI)/items.length;
  const pointFor = (val, i) => {
    const r = radius * (Math.max(0,Math.min(maxVal,val))/maxVal);
    const angle = -Math.PI/2 + i*angleStep;
    return [center + r*Math.cos(angle), center + r*Math.sin(angle)];
  };
  const polyStr = pts => pts.map(p=>p.join(",")).join(" ");
  const gridRings = [1,2,3,4,5].map(level=>{
    const pts = items.map((_,i)=> pointFor(level, i));
    const isThreshold = level===READY_THRESHOLD;
    const stroke = isThreshold ? "#3F7D4C" : "#E7DFD2";
    const width = isThreshold ? 2 : 1;
    const dash = isThreshold ? "" : "";
    return `<polygon points="${polyStr(pts)}" fill="none" stroke="${stroke}" stroke-width="${width}"/>`;
  }).join("");
  const axisLines = items.map((_,i)=>{
    const [x,y] = pointFor(maxVal, i);
    return `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="#E7DFD2" stroke-width="1"/>`;
  }).join("");
  const labels = items.map((it,i)=>{
    const angle = -Math.PI/2 + i*angleStep;
    const lx = center + (radius+24)*Math.cos(angle);
    const ly = center + (radius+24)*Math.sin(angle);
    let anchor = "middle";
    if(Math.cos(angle) > 0.3) anchor = "start";
    else if(Math.cos(angle) < -0.3) anchor = "end";
    return `<text x="${lx}" y="${ly}" font-size="11" font-weight="700" fill="#2B2420" text-anchor="${anchor}" dominant-baseline="middle">${it.code}</text>`;
  }).join("");
  const avgPts = items.map((it)=> pointFor(seriesAvg[it.code]??0, items.indexOf(it)));
  const indPts = items.map((it)=> pointFor(seriesIndividual[it.code]??0, items.indexOf(it)));
  const avgPoly = `<polygon points="${polyStr(avgPts)}" fill="none" stroke="#8A7F72" stroke-width="2" stroke-dasharray="4,3"/>`;
  const indPoly = `<polygon points="${polyStr(indPts)}" fill="#C1531B" fill-opacity="0.22" stroke="#C1531B" stroke-width="2.5"/>`;
  return `<svg viewBox="0 0 ${size} ${size}" width="100%" style="max-width:360px;display:block;margin:0 auto;">
    ${gridRings}${axisLines}${avgPoly}${indPoly}${labels}
  </svg>`;
}

const RANK_ORDER = ["D4","D3","D2","D1","K3"];
function rankIndex(rank){
  const i = RANK_ORDER.indexOf(rank);
  return i===-1 ? 999 : i;
}
function overallScore(staffObj, columns, field){
  const vals = columns.map(c=> staffObj[field][c] ?? 0);
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}

const sortState = {
  positions: {col:"rank", dir:"asc"},
  tasks: {col:"rank", dir:"asc"},
};

function renderScoreDashboard(columns, field, colMeta){
  const wrap = document.createElement("div");
  wrap.appendChild(titleEl());
  const card = document.createElement("div");
  card.className = "card";
  const tableWrap = document.createElement("div");
  tableWrap.className = "table-wrap";
  const table = document.createElement("table");

  const s = sortState[field];
  const arrow = (col) => s.col===col ? (s.dir==="asc" ? " ▲" : " ▼") : "";

  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  const nameTh = document.createElement("th");
  nameTh.className = "name-col";
  nameTh.style.cursor = "pointer";
  nameTh.textContent = "氏名" + arrow("name");
  nameTh.onclick = ()=> applySort("name", "name");
  headRow.appendChild(nameTh);

  const rankTh = document.createElement("th");
  rankTh.style.cursor = "pointer";
  rankTh.textContent = "学年" + arrow("rank");
  rankTh.onclick = ()=> applySort("rank", "rank");
  headRow.appendChild(rankTh);

  const tenureTh = document.createElement("th");
  tenureTh.textContent = "勤続";
  headRow.appendChild(tenureTh);

  const overallTh = document.createElement("th");
  overallTh.style.cursor = "pointer";
  overallTh.textContent = "総合評価" + arrow("overall");
  overallTh.onclick = ()=> applySort("overall", "number");
  headRow.appendChild(overallTh);

  colMeta.forEach(c=>{
    const th = document.createElement("th");
    th.title = c.desc || c.code;
    th.style.cursor = "pointer";
    th.textContent = c.code + arrow(c.code);
    th.onclick = ()=> applySort(c.code, "number");
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  function applySort(col, kind){
    if(s.col===col){
      s.dir = s.dir==="asc" ? "desc" : "asc";
    } else {
      s.col = col;
      s.dir = kind==="number" ? "desc" : "asc"; // 点数系は高い順から、氏名/学年は自然順から
    }
    render();
  }

  const tbody = document.createElement("tbody");
  const sorted = [...state.staff].sort((a,b)=>{
    let va, vb;
    if(s.col==="name"){ va=a.name; vb=b.name; }
    else if(s.col==="rank"){ va=rankIndex(a.rank); vb=rankIndex(b.rank); }
    else if(s.col==="overall"){ va=overallScore(a,columns,field); vb=overallScore(b,columns,field); }
    else { va = a[field][s.col] ?? 0; vb = b[field][s.col] ?? 0; }
    let cmp;
    if(typeof va === "string"){ cmp = va.localeCompare(vb, "ja"); }
    else { cmp = va - vb; }
    return s.dir==="asc" ? cmp : -cmp;
  });

  sorted.forEach(st=>{
    const tr = document.createElement("tr");
    const ov = overallScore(st, columns, field).toFixed(2);
    tr.innerHTML = `<td class="name-col">${st.name}</td>` +
      `<td><span class="rank-chip">${st.rank}</span></td>` +
      `<td style="color:var(--muted);font-size:11.5px;">${st.tenure}</td>` +
      `<td style="font-weight:800;">${ov}</td>` +
      columns.map(code=>{
        const v = st[field][code] ?? 0;
        const cls = v>=READY_THRESHOLD ? "ready" : (v>=1 ? "mid" : "low");
        return `<td><span class="score-cell ${cls}">${v}</span></td>`;
      }).join("");
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  card.appendChild(tableWrap);
  const legend = document.createElement("div");
  legend.className = "legend";
  legend.innerHTML = `
    <span><span class="dot" style="background:var(--green)"></span>3点以上・独り立ち可</span>
    <span><span class="dot" style="background:var(--amber)"></span>1〜2点・平日/トレーニング中</span>
    <span><span class="dot" style="background:var(--gray-ink)"></span>0点・未経験</span>
    <span style="margin-left:auto;">列見出しをクリックすると並び替えできます</span>
  `;
  card.appendChild(legend);
  wrap.appendChild(card);

  // 不足しがちな項目の検知 + 目標自動作成
  const readyCount = (code) => state.staff.filter(st => (st[field][code] ?? 0) >= READY_THRESHOLD).length;
  const weakItems = colMeta.map(c=>({code:c.code, name:c.name||"", count: readyCount(c.code)}))
    .sort((a,b)=> a.count - b.count)
    .slice(0,3);
  const weakCard = document.createElement("div");
  weakCard.className = "card";
  weakCard.innerHTML = `<div style="font-weight:800;margin-bottom:10px;">育成優先項目</div>`;
  weakItems.forEach(w=>{
    const row = document.createElement("div");
    row.className = "item-row";
    row.innerHTML = `
      <div>
        <div><strong>${w.code}</strong>${w.name ? ` <span class="meta" style="display:inline;">${w.name}</span>` : ""}</div>
        <div class="meta">独り立ち可能:${w.count}人 / ${state.staff.length}人</div>
      </div>
    `;
    const btn = document.createElement("button");
    btn.className = "ghost";
    btn.textContent = "目標を自動作成";
    btn.onclick = ()=> autoSuggestGoals(w.code, w.name, field);
    row.appendChild(btn);
    weakCard.appendChild(row);
  });
  wrap.appendChild(weakCard);
  return wrap;
}

function autoSuggestGoals(code, name, field){
  const itemLabel = name ? `${code}(${name})` : code;
  const candidates = state.staff
    .filter(s => { const v = s[field][code] ?? 0; return v>=1 && v<READY_THRESHOLD; })
    .sort((a,b)=> (b[field][code] ?? 0) - (a[field][code] ?? 0))
    .slice(0,3);
  let added = 0;
  candidates.forEach(s=>{
    const dup = state.goals.some(g=> g.staffId===s.id && g.item===itemLabel);
    if(dup) return;
    state.goals.push({
      id: "g"+Date.now()+Math.random().toString(36).slice(2,6),
      staffId: s.id,
      item: itemLabel,
      targetScore: READY_THRESHOLD,
      due: addDays(todayISO(), 30),
      note: `不足検知による自動提案(現在${s[field][code] ?? 0}点)`,
    });
    added++;
  });
  if(added>0) saveState();
  showToast(added>0 ? `${added}件の目標案を追加しました` : "追加できる候補がいません(0点のみ、または既に目標済み)");
  if(added>0){ activeTab = "goals"; render(); }
}

function applyTenureMigration(s){
  let migrated = false;
  s.staff.forEach(st=>{
    const t = TENURE_MAP[st.name] || "-";
    if(st.tenure !== t){ st.tenure = t; migrated = true; }
  });
  return migrated;
}

/* ---- ログイン後だけデータ同期を開始する ---- */
let appStarted = false;
function startApp(){
  if(appStarted) return;
  appStarted = true;
  document.getElementById("main").innerHTML = `<div class="empty">読み込み中...</div>`;

  // フォーム内の入力欄にフォーカスがある間は「編集中」とみなし、
  // 他の人の保存によるリアルタイム再描画で入力中の内容が消えないようにする。
  // (これまではポジション/業務評価のスライダーだけ対策していたが、
  //  目標・教育ログの追加/編集フォームは未対策で入力が消えるバグがあった)
  const mainEl = document.getElementById("main");
  mainEl.addEventListener("focusin", (e)=>{
    if(["INPUT","SELECT","TEXTAREA"].includes(e.target.tagName)) editingForm = true;
  });
  mainEl.addEventListener("focusout", ()=>{
    setTimeout(()=>{
      const a = document.activeElement;
      if(!a || !["INPUT","SELECT","TEXTAREA"].includes(a.tagName) || !mainEl.contains(a)){
        editingForm = false;
      }
    }, 80);
  });

  // Firebase の接続状態そのものを監視(公式の特殊パス)
  onValue(ref(db, ".info/connected"), (snap)=>{
    setSyncStatus(snap.val() === true);
  });

  // データ本体をリアルタイム購読。誰かが保存すると、この関数が全員の画面で自動的に呼ばれる
  onValue(stateRef, (snapshot)=>{
    const val = snapshot.val();
    if(val === null){
      // 初回アクセス:まだデータが無いのでシードデータを書き込む
      if(!firstLoadDone){
        state = defaultState();
        firstLoadDone = true;
        render();
        saveState();
      }
      return;
    }
    if(editingForm && firstLoadDone){
      // 入力中に他の人の更新が来た場合は、今の入力を壊さないよう取り込みを見送る
      return;
    }
    state = val;
    // Firebase Realtime Database は空配列([])を保存できず、キーごと消えてしまう。
    // 目標・教育ログを全部削除すると undefined になり、画面が真っ白になっていたのを修正。
    if(!Array.isArray(state.staff)) state.staff = [];
    if(!Array.isArray(state.goals)) state.goals = [];
    if(!Array.isArray(state.logs)) state.logs = [];
    const migrated = applyTenureMigration(state);
    firstLoadDone = true;
    render();
    if(migrated) saveState();
  });
}

/* ---- ログイン画面の制御 ---- */
/* Firebase Authenticationはメール形式のIDが必須のため、社員コードを内部的に
   「コード@gaisenmon.local」という疑似メールアドレスに変換して使う。
   実際にメールが送られることはなく、あくまで識別子として使うだけ。 */
const LOGIN_DOMAIN = "gaisenmon.local";
function codeToEmail(code){
  return `${code.trim()}@${LOGIN_DOMAIN}`;
}
document.getElementById("login-btn").onclick = async ()=>{
  const code = document.getElementById("login-code").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";
  if(!code || !password){
    errEl.textContent = "社員コードとパスワードを入力してください。";
    return;
  }
  try{
    await signInWithEmailAndPassword(auth, codeToEmail(code), password);
  }catch(e){
    errEl.textContent = "ログインできませんでした。社員コードかパスワードをご確認ください。";
  }
};
document.getElementById("login-code").addEventListener("keydown", (e)=>{
  if(e.key === "Enter") document.getElementById("login-password").focus();
});
document.getElementById("login-password").addEventListener("keydown", (e)=>{
  if(e.key === "Enter") document.getElementById("login-btn").click();
});
document.getElementById("logout-btn").onclick = ()=> signOut(auth);

onAuthStateChanged(auth, (user)=>{
  const loginScreen = document.getElementById("login-screen");
  const app = document.getElementById("app");
  if(user){
    loginScreen.style.display = "none";
    app.style.display = "";
    startApp();
  } else {
    loginScreen.style.display = "flex";
    app.style.display = "none";
  }
});
</script>
